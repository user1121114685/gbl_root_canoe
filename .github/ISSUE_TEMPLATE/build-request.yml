name: "编译请求 | Build Request"
description: "上传包含 ABL.elf 的压缩包并触发 GitHub Actions 自动编译"
title: "[Build] "
labels: ["build-request"]
body:
  - type: markdown
    attributes:
      value: |
        请使用这个模板提交自动编译请求。

        压缩包内必须包含且仅包含一个名为 `ABL.elf` 的文件，文件名匹配时忽略大小写。

        当前支持机型：
        - 理论上：所有小米红米骁龙8EliteGen5处理器设备
        - 小米17
        - 小米17Pro
        - 小米17ProMax
        - 小米17Ultra
        - 红米K90ProMax
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认 | Checklist
      options:
        - label: 压缩包内包含且仅包含一个名为 `ABL.elf` 的文件。
          required: true
        - label: 我理解工作流会使用该文件作为 `make build` 的输入。
          required: true
    validations:
      required: true
  - type: upload
    id: abl_package
    attributes:
      label: ABL 压缩包 | ABL Package
      description: "上传包含 `ABL.elf` 的压缩包。"
    validations:
      required: true
  - type: input
    id: abl_elf_url
    attributes:
      label: ABL.elf 直链（可选） | Direct URL (Optional)
      description: "如果你已经有可以直接下载 `ABL.elf` 的链接，可以填写这里；填写后会优先使用该链接。"
      placeholder: "https://example.com/ABL.elf"
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: 设备型号 | Device
      description: "请填写上方支持列表中的机型名称。"
      placeholder: "例如：小米17Ultra"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 备注（可选） | Notes (Optional)
      description: "补充你希望维护者知道的信息。"
      placeholder: "例如：来源版本、测试说明等"
    validations:
      required: false
